# llm-usage configuration
# all durations are in seconds unless noted otherwise

# usage provider
# - "claude": anthropic oauth /limits data (existing behavior)
# - "codex": poll codex/chatgpt usage API (`/backend-api/wham/usage`)
# - "codex_logs": parse local codex session logs (~/.codex/sessions)
provider:
  name: "claude"
  codex:
    # primary auth source (official codex CLI auth file)
    auth_file: "~/.codex/auth.json"

    # fallback auth sources (opencode stores OpenAI OAuth here)
    fallback_auth_files:
      - "~/.local/share/opencode/auth.json"

    # codex usage endpoint used by codex CLI
    usage_url: "https://chatgpt.com/backend-api/wham/usage"

    # oauth refresh endpoint + codex client id
    refresh_url: "https://auth.openai.com/oauth/token"
    refresh_client_id: "app_EMoamEEZ73f0CkXaXp7hrann"

    # request timeout for usage + refresh calls
    request_timeout_seconds: 10

    # -- settings used only when provider.name = "codex_logs" --

    # root directory containing codex rollout jsonl files
    sessions_root: "~/.codex/sessions"

    # warn if latest token_count event is older than this (codex_logs only)
    max_staleness_seconds: 1800

# account rotation — when the tracked window hits switch_threshold %
# utilization, suggest switching to the account with the most remaining
# capacity (based on last known poll data in usage.db)
accounts:
  - fadedlamp@gmail.com
  - fadedlamp42@gmail.com
  - peter@prism-dynamics.org
switch_threshold: 90

# which usage window to track for brightness and readout
# "five_hour" = the 5-hour sliding window (resets frequently, gates immediate usage)
# "seven_day" = weekly aggregate
# "seven_day_sonnet" = weekly sonnet-only
# "most_constrained" = whichever has the highest utilization
window: "five_hour"

# how often to poll the configured provider
poll_interval: 120

# sttts inter-service coordination
# speech announcements wait indefinitely for mic idle before speaking,
# polled via GET /mic-status on the relay. speech is never forced
# through while the mic is capturing — it queues until idle.
# (handled by prism.mac.speech; logs every 30s while waiting)
sttts:
  enabled: true
  # relay_url: "http://127.0.0.1:8393"  # default; override for remote hosts

# -- output surfaces --
output:

  # voice readouts via cute-say
  # cmd+shift+b = whispered hourly percentage (chatterbox)
  # cmd+shift+alt+b = full spoken report (kokoro 1.4x)
  speech: true

  # MacBook keyboard backlight control
  keyboard:
    enabled: false

    # brightness floor — the dimmest the keyboard goes at 100% utilization
    # 0.0 = fully dark, 0.05 = faint glow
    min_brightness: 0.0

    # fade speed for brightness transitions
    # -1 = system default (smooth fade)
    #  0 = instant snap (no transition)
    #  higher = slower fades
    fade_speed: 3

    # -- pulse mode (breathing animation when running low) --

    # remaining percentage at which pulse mode kicks in
    # the keyboard breathes between 0 and N% where N is the remaining %
    pulse_threshold: 10.0

    # how many seconds for one full breath cycle (in and out)
    pulse_period: 3.0

    # -- percentage readout (blink the remaining % periodically) --
    # blinks the tens digit, pauses, then blinks the units digit
    # example: 24% remaining = 2 blinks, pause, 4 blinks
    # a digit of 0 is shown as one long blink
    #
    # also triggerable on-demand via SIGUSR1:
    #   pm2 sendSignal SIGUSR1 llm-usage

    readout:
      # trigger a readout every time remaining crosses a multiple of this
      # 5 = readout at 100%, 95%, 90%, ... 5% (20 notifications per cycle)
      every_percent: 5

      # only show readouts when remaining is at or below this threshold
      # 100 = always show; 60 = only below 60%
      threshold: 100.0

      # granularity of the displayed percentage
      # "ones" = exact percentage (24% = 2+4 blinks)
      # "tens" = tens digit only (24% = 2 blinks)
      granularity: "ones"

      # how long each blink stays fully lit (seconds)
      blink_on: 0.20

      # gap between blinks (seconds)
      blink_off: 0.12

      # fade speed for readout blinks (independent from main fade_speed)
      # 0 = hard snap, 1-3 = slight softness, higher = more gradual
      # try 2 for a crisp-but-not-jarring feel
      fade_speed: 2

      # pause between tens digit and units digit (seconds)
      digit_pause: 1

      # pause after the full readout before resuming normal brightness
      end_pause: 2
